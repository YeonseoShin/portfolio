<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpendLens — 저축 도우미</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<header>
  <div class="logo">SpendLens</div>
  <div class="header-right">
    <button class="add-tx-btn" onclick="openModal()">+ 지출 추가</button>
    <a href="../../index.html" class="back">← 포트폴리오로</a>
  </div>
</header>

<main>
  <!-- 상단 요약 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">월 예산 한도</div>
      <div class="stat-val purple" id="s-budget">₩0</div>
      <button class="edit-budget-btn" onclick="editBudget()">한도 설정</button>
    </div>
    <div class="stat-card">
      <div class="stat-label">이번달 지출</div>
      <div class="stat-val red" id="s-spent">₩0</div>
      <div class="stat-sub" id="s-period"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">잔여 예산</div>
      <div class="stat-val green" id="s-remain">₩0</div>
      <div class="stat-sub" id="s-remain-sub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">저축 가능 예측</div>
      <div class="stat-val purple" id="s-save">₩0</div>
      <div class="stat-sub">이 페이스 유지 시</div>
    </div>
  </div>

  <!-- 예산 진행 바 -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">예산 사용률</span>
      <span id="budget-pct" class="budget-pct-label">0%</span>
    </div>
    <div class="budget-bar-bg"><div id="budget-bar" class="budget-bar"></div></div>
    <div id="warnings" class="warnings"></div>
  </div>

  <div class="grid2">
    <!-- 카테고리 차트 -->
    <div class="card">
      <div class="card-header"><span class="card-title">카테고리별 지출</span></div>
      <div class="chart-wrap"><canvas id="cat-chart" role="img" aria-label="카테고리별 지출 도넛 차트"></canvas></div>
      <div id="cat-legend" class="cat-legend"></div>
    </div>
    <!-- 일별 지출 -->
    <div class="card">
      <div class="card-header"><span class="card-title">일별 지출 추이</span></div>
      <div class="chart-wrap"><canvas id="daily-chart" role="img" aria-label="일별 지출 막대그래프"></canvas></div>
    </div>
  </div>

  <!-- 거래 내역 -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">거래 내역</span>
      <button class="clear-btn" onclick="clearAll()">전체 삭제</button>
    </div>
    <div id="tx-list" class="tx-list"></div>
  </div>
</main>

<!-- 지출 추가 모달 -->
<div id="modal-bg" class="modal-bg hidden" onclick="closeModal(event)">
  <div class="modal">
    <h3 class="modal-title">지출 추가</h3>
    <div class="modal-fields">
      <label>금액 (원)</label>
      <input type="number" id="m-amount" placeholder="예) 12000" min="0" />
      <label>카테고리</label>
      <select id="m-category">
        <option value="식비">🍚 식비</option>
        <option value="교통">🚌 교통</option>
        <option value="쇼핑">🛍 쇼핑</option>
        <option value="문화">🎬 문화</option>
        <option value="의료">💊 의료</option>
        <option value="기타">📦 기타</option>
      </select>
      <label>메모 (선택)</label>
      <input type="text" id="m-memo" placeholder="예) 점심 - 김치찌개" />
    </div>
    <div class="modal-btns">
      <button onclick="addTransaction()">추가</button>
      <button class="outline" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<script src="budget.js"></script>
</body>
</html>
